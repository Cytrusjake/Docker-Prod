version: "3.9"

services:
  php:
    build: .
    volumes:
      - app:/var/www/html
      - php_user_ini:/usr/local/etc/php/conf.d
    depends_on:
      - mariadb
      - redis
      - memcached

  nginx:
    image: nginx:stable
    volumes:
      - app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - nginx_user_snippets:/etc/nginx/user-snippets
    depends_on:
      - php
      - phpmyadmin
    # NOTE: no host port mapping; varnish is the public entrypoint.

  varnish:
    image: varnish:stable
    depends_on:
      - nginx
    ports:
      - "80:80"
    volumes:
      - ./varnish/default.vcl:/etc/varnish/default.vcl

  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db:/var/lib/mysql

  redis:
    image: redis:7

  memcached:
    image: memcached:latest

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
    # IMPORTANT: no ports here (internal only)

volumes:
  app:
  db:
  php_user_ini:
  nginx_user_snippets: