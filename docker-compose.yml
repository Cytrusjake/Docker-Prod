version: "3.9"

services:
  php:
    build: .
    volumes:
      - app:/var/www/html
      - php_user_ini:/usr/local/etc/php/conf.d
    depends_on:
      - mariadb
      - redis
      - memcached

  nginx:
    build:
      context: ./nginx
    volumes:
      - app:/var/www/html
      - nginx_user_snippets:/etc/nginx/user-snippets
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?PUBLIC_DOMAIN is required}
    depends_on:
      - php
      - phpmyadmin

  varnish:
    build:
      context: ./varnish
    depends_on:
      - nginx
    ports:
      - "8081:80"

  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db:/var/lib/mysql

  redis:
    image: redis:7

  memcached:
    image: memcached:latest

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M

volumes:
  app:
  db:
  php_user_ini:
  nginx_user_snippets: