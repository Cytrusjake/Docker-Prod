version: '3.9'

services:

  php:
    build: .
    container_name: php
    volumes:
      - app:/var/www/html
      - php_user_ini:/usr/local/etc/php/conf.d
    depends_on:
      - mariadb
      - redis
      - memcached

  nginx:
    image: nginx:stable
    container_name: nginx
    volumes:
      - app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - nginx_user_snippets:/etc/nginx/user-snippets
    depends_on:
      - php
    ports:
      - "8080:80"

  varnish:
    image: varnish:stable
    container_name: varnish
    depends_on:
      - nginx
    ports:
      - "80:80"
    volumes:
      - ./varnish/default.vcl:/etc/varnish/default.vcl

  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db:/var/lib/mysql

  redis:
    image: redis:7
    container_name: redis

  memcached:
    image: memcached:latest
    container_name: memcached

volumes:
  app:
  db:
  php_user_ini:
  nginx_user_snippets: